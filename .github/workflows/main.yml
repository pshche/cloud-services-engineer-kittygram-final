name: Kittygram CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: kittygram-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Unit & Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13.10
        env:
          POSTGRES_DB: ${{ secrets.TEST_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest requests pyyaml -r backend/requirements.txt

      - name: Lint with Flake8
        run: flake8 backend/ --max-line-length=120

      - name: Django system check
        env:
          SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
          DEBUG: "False"
          POSTGRES_DB: ${{ secrets.TEST_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          cd backend
          python manage.py check --deploy

      - name: Run backend tests
        env:
          SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
          DEBUG: "True"
          POSTGRES_DB: ${{ secrets.TEST_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          pytest tests/ -v --ignore=tests/test_connection.py --tb=short

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: CI=true npm test -- --watchAll=false --passWithNoTests

  build_and_push:
    name: Build and push Docker images
    needs: tests
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest
            ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gateway
        uses: docker/build-push-action@v7
        with:
          context: ./nginx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production server
    needs: build_and_push
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose to server
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.production.yml \
            ${{ secrets.USER }}@${{ secrets.HOST }}:/home/${{ secrets.USER }}/kittygram/

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.USER }}@${{ secrets.HOST }} << 'EOF'
            cd /home/${{ secrets.USER }}/kittygram
            
            echo "🛑 Stopping old containers..."
            sudo docker compose -f docker-compose.production.yml down 2>/dev/null || true
            
            echo "🧹 Cleaning up..."
            sudo docker system prune -af 2>/dev/null || true
            
            echo "📦 Pulling new images..."
            sudo docker compose -f docker-compose.production.yml pull
            
            echo "🚀 Starting containers..."
            sudo docker compose -f docker-compose.production.yml up -d --force-recreate
            
            echo "⏳ Waiting for database..."
            sleep 15
            
            echo "🔄 Running migrations..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate || true
            
            echo "📁 Collecting static files..."
            sudo docker compose -f docker-compose.production.yml exec -T backend python manage.py collectstatic --no-input || true
            
            echo "🎨 Copying frontend static files..."
            sudo docker compose -f docker-compose.production.yml exec -T frontend sh -c "cp -r /app/build/static/. /static/ 2>/dev/null || true"
            sudo docker compose -f docker-compose.production.yml exec -T frontend sh -c "cp /app/build/index.html /app/build/asset-manifest.json /app/build/manifest.json /app/build/robots.txt /app/build/favicon.ico /static/ 2>/dev/null || true"
            
            echo "🔄 Reloading nginx..."
            sudo docker compose -f docker-compose.production.yml exec -T gateway nginx -s reload 2>/dev/null || true
            
            echo "✅ Deployment complete!"
            sudo docker compose -f docker-compose.production.yml ps
          EOF

  health_check:
    name: Health check
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    if: always()

    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check API health
        run: |
          curl -f http://${{ secrets.HOST }}:9000/api/users/ || echo "API not ready yet"

      - name: Check frontend
        run: |
          curl -f http://${{ secrets.HOST }}:9000/ || echo "Frontend not ready yet"

  telegram_notify:
    name: Telegram notification
    needs: [build_and_push, deploy, health_check]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ needs.build_and_push.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            STATUS="✅ SUCCESS"
            EMOJI="✅"
          else
            STATUS="❌ FAILED"
            EMOJI="❌"
          fi
          
          MESSAGE="${EMOJI} Kittygram Deployment: ${STATUS}
          
          📦 Build: ${{ needs.build_and_push.result }}
          🚀 Deploy: ${{ needs.deploy.result }}
          🏥 Health: ${{ needs.health_check.result }}
          
          🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${MESSAGE}\"}"
